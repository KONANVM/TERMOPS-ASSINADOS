<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termo de Parceria Estrategica</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
.container { max-width: 700px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
h1 { text-align: center; color: #1a1a2e; margin-bottom: 10px; font-size: 22px; }
.subtitle { text-align: center; color: #555; margin-bottom: 30px; font-size: 14px; }
.form-group { margin-bottom: 20px; }
label { display: block; font-weight: bold; margin-bottom: 6px; color: #333; font-size: 14px; }
input[type=text], input[type=email], input[type=date] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; }
input:focus { outline: none; border-color: #4CAF50; }
.canvas-container { border: 2px solid #ddd; border-radius: 8px; overflow: hidden; background: #fafafa; }
canvas { display: block; cursor: crosshair; touch-action: none; width: 100%; height: 200px; }
.canvas-controls { margin-top: 10px; }
.btn-clear { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
.btn-submit { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.status { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; display: none; }
.status.success { background: #d4edda; color: #155724; display: block; }
.status.error { background: #f8d7da; color: #721c24; display: block; }
.status.loading { background: #fff3cd; color: #856404; display: block; }
</style>
</head>
<body>
<div class="container">
<h1>Termo de Parceria Estrategica</h1>
<p class="subtitle">Preencha os dados abaixo para formalizar sua parceria</p>
<form id="termoForm">
<div class="form-group">
<label for="nome">Nome Completo *</label>
<input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
</div>
<div class="form-group">
<label for="cpf">CPF *</label>
<input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
</div>
<div class="form-group">
<label for="email">E-mail *</label>
<input type="email" id="email" name="email" placeholder="seu@email.com" required>
</div>
<div class="form-group">
<label for="cidade">Cidade / Estado *</label>
<input type="text" id="cidade" name="cidade" placeholder="Ex: Sao Paulo - SP" required>
</div>
<div class="form-group">
<label for="data">Data *</label>
<input type="date" id="data" name="data" required>
</div>
<div class="form-group">
<label>Assinatura *</label>
<div class="canvas-container">
<canvas id="signatureCanvas"></canvas>
</div>
<div class="canvas-controls">
<button type="button" class="btn-clear" id="clearBtn">Limpar Assinatura</button>
</div>
</div>
<button type="submit" class="btn-submit" id="submitBtn">Assinar e Enviar Termo</button>
<div class="status" id="statusMsg"></div>
</form>
</div>
<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6Aq-4q48rK8Uosez9oelYqfrAblIgzqUEWPZx9mHt58BN2qeYkhLIjQpQbWh9UOMT/exec';
var canvas = document.getElementById('signatureCanvas');
var ctx = canvas.getContext('2d');
var drawing = false;
var hasSignature = false;
function resizeCanvas() {
  var w = canvas.offsetWidth || 620;
  canvas.width = w;
  canvas.height = 200;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
function getPos(e) {
  var rect = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
canvas.addEventListener('mousedown', function(e) { drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
canvas.addEventListener('mousemove', function(e) { if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSignature = true; });
canvas.addEventListener('mouseup', function() { drawing = false; });
canvas.addEventListener('mouseleave', function() { drawing = false; });
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); drawing = true; var p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); if (!drawing) return; var p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSignature = true; }, { passive: false });
canvas.addEventListener('touchend', function() { drawing = false; });
document.getElementById('clearBtn').addEventListener('click', function() { ctx.clearRect(0, 0, canvas.width, canvas.height); hasSignature = false; });
document.getElementById('cpf').addEventListener('input', function() {
  var v = this.value.replace(/D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  v = v.replace(/(d{3})(d)/, '$1.$2').replace(/(d{3})(d)/, '$1.$2').replace(/(d{3})(d{1,2})$/, '$1-$2');
  this.value = v;
});
document.getElementById('data').value = new Date().toISOString().split('T')[0];
function showStatus(msg, type) {
  var s = document.getElementById('statusMsg');
  s.textContent = msg;
  s.className = 'status ' + type;
}
document.getElementById('termoForm').addEventListener('submit', function(e) {
  e.preventDefault();
  if (!hasSignature) { showStatus('Por favor, desenhe sua assinatura antes de enviar.', 'error'); return; }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true;
  showStatus('Enviando dados... aguarde.', 'loading');
  var payload = JSON.stringify({
    nome: document.getElementById('nome').value.trim(),
    cpf: document.getElementById('cpf').value.trim(),
    email: document.getElementById('email').value.trim(),
    cidade: document.getElementById('cidade').value.trim(),
    data: document.getElementById('data').value,
    assinatura: canvas.toDataURL('image/png'),
    timestamp: new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' })
  });
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: payload
  }).then(function() {
    showStatus('Termo enviado com sucesso! Seus dados foram registrados.', 'success');
    btn.disabled = false;
    setTimeout(function() {
      document.getElementById('termoForm').reset();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasSignature = false;
      document.getElementById('data').value = new Date().toISOString().split('T')[0];
    }, 3000);
  }).catch(function(err) {
    showStatus('Erro ao enviar: ' + err.message, 'error');
    btn.disabled = false;
  });
});
window.addEventListener('load', resizeCanvas);
window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
